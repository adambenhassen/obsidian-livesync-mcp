# End-to-end stack for livesync-mcp:
#   couchdb       — the remote sync target
#   couchdb-init  — one-shot: creates system DBs + the sync DB
#   livesync-mcp  — the Go MCP server + supervised livesync-cli daemon
#
# Usage:
#   docker compose up --build
#   curl -s -H "Authorization: Bearer changeme" http://localhost:8765/healthz
#
# The integration test (test/integration_test.go) can run against this stack;
# see test/README.md.

services:
  couchdb:
    image: couchdb:3.3.3
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    ports:
      - "5984:5984"
    volumes:
      - couchdb-data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-u", "admin:password", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 5s
      retries: 20

  couchdb-init:
    image: curlimages/curl:8.11.1
    depends_on:
      couchdb:
        condition: service_healthy
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
      COUCHDB_DBNAME: livesync
    volumes:
      - ./deploy/couchdb-init.sh:/couchdb-init.sh:ro
    entrypoint: ["sh", "/couchdb-init.sh"]
    restart: "no"

  livesync-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      couchdb-init:
        condition: service_completed_successfully
    environment:
      COUCHDB_URI: http://couchdb:5984
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
      COUCHDB_DBNAME: livesync
      # End-to-end encryption passphrase (empty disables E2EE).
      COUCHDB_PASSPHRASE: ""
      # Must match the vault's "Use path obfuscation" setting. Wrong value
      # against an obfuscated vault syncs 0-byte files instead of content.
      USE_PATH_OBFUSCATION: "false"
      LIVESYNC_VAULT: /vault
      LIVESYNC_DB: /db
      # Daemon CouchDB poll interval (seconds) — drives bidirectional sync.
      LIVESYNC_INTERVAL: "5"
      MCP_ADDR: 0.0.0.0:8765
      MCP_API_KEY: changeme
      # Set to "true" to expose only read tools (no write/append/delete/move).
      READ_ONLY: "false"
    ports:
      - "8765:8765"
    volumes:
      - vault-data:/vault
      - db-data:/db
    # Hard memory backstop (the image also caps the daemon's Node heap via
    # NODE_OPTIONS). If the container still inflates past this, it is
    # OOM-killed and restarted — sync resumes instead of eating the host.
    mem_limit: 1g
    # Self-heal: the server exits if the sync daemon dies, and /healthz reports
    # 503 when sync is down — restart the container so syncing resumes.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8765/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Gated Go integration test (build tag `integration`). Runs only under the
  # `test` profile: `docker compose --profile test run --rm e2e-test`.
  # Uses its own db volume so it never contends with livesync-mcp for the
  # single-process database.
  e2e-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: e2e
    profiles: ["test"]
    depends_on:
      couchdb-init:
        condition: service_completed_successfully
    environment:
      LIVESYNC_IT: "1"
      LIVESYNC_CLI: livesync-cli
      LIVESYNC_DB: /db
      COUCHDB_URI: http://couchdb:5984
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
      COUCHDB_DBNAME: livesync
    volumes:
      - e2e-db:/db

volumes:
  couchdb-data:
  vault-data:
  db-data:
  e2e-db:
